<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- [FIX 19.04.2026] Zmienione z "black-translucent" na "black".
         "black-translucent" każe iOS PWA rysować treść POD paskiem statusu,
         co na niektórych urządzeniach (zwłaszcza Android PWA gdzie
         env(safe-area-inset-top) zwraca 0) powodowało że zegarek/bateria
         systemowa zasłaniały nagłówek. "black" = pasek nieprzezroczysty,
         app startuje poniżej. theme-color poniżej nadaje mu kolor tła. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="GROT-X" />
    <meta name="theme-color" content="#0a3a2a" />

    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <title>GROT-X</title>
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
